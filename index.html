<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIG29</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card */
.card{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  text-align:center;
  width:260px;
}

/* PDF icon */
.icon{
  font-size:40px;
  color:#999;
}

/* Button */
button{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:25px;
  background:#2b7de9;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* Viewer */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  border:none;
  display:none;
}

</style>
</head>

<body>

<div class="card" id="card">
<div class="icon">📄</div>
<h3>mig29.pdf</h3>

<button onclick="openPDF()">Open</button>
</div>

<iframe 
id="viewer"
class="viewer"
src="">
</iframe>

<script>

function openPDF(){

document.getElementById("card").style.display="none";

document.getElementById("viewer").style.display="block";

document.getElementById("viewer").src=
"https://mozilla.github.io/pdf.js/web/viewer.html?file=https://boxofscraps2-arch.github.io/mig29.pdf";

}

</script>

</body>
</html>
